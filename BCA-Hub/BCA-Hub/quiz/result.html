<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quiz Result</title>

    <link rel="stylesheet"
          href="result.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="../css/responsive.css">

</head>

<body>

<nav class="quiz-topbar">
    <div class="quiz-topbar-left">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>BCA Hub Quiz</span>
    </div>
    <div class="quiz-topbar-right">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>
</nav>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="sidebar" id="sidebar">
    <div class="logo">
        <i class="fa-solid fa-graduation-cap"></i>
        <div class="logo-text">
            <h2>BCA Hub</h2>
            <p>Learn • Practice • Grow</p>
        </div>
    </div>
    <div class="menu">
        <a href="../dashboard.html"><div class="menu-item"><i class="fa-solid fa-house"></i><span>Dashboard</span></div></a>
        <a href="../pages/notes/notes.html"><div class="menu-item"><i class="fa-solid fa-book"></i><span>Notes</span></div></a>
        <a href="../pages/coding/index.html"><div class="menu-item"><i class="fa-solid fa-code"></i><span>Coding</span></div></a>
        <a href="../syllabus/syllabus.html"><div class="menu-item"><i class="fa-solid fa-file-lines"></i><span>Syllabus</span></div></a>
        <a href="../papers/index.html"><div class="menu-item"><i class="fa-solid fa-file-pdf"></i><span>Papers</span></div></a>
        <a href="../quiz/index.html"><div class="menu-item active"><i class="fa-solid fa-clipboard-question"></i><span>Quiz</span></div></a>
        <a href="../placement/index.html"><div class="menu-item"><i class="fa-solid fa-briefcase"></i><span>Placement</span></div></a>
        <a href="../profile/profile.html"><div class="menu-item"><i class="fa-solid fa-user"></i><span>Profile</span></div></a>
    </div>
</div>

<div class="result-container">

    <div class="result-card">

        <div class="badge gold">
            <i class="fa-solid fa-medal"></i>
            Quiz Completed
        </div>

        <div class="score-display">

            <div class="score-circle">
                <span id="score-percent">0%</span>
            </div>

            <p id="result-message">Great effort! Keep practicing.</p>

        </div>

        <div class="result-stats">

            <div class="stat">
                <strong id="correct-count">0</strong>
                <span>Correct</span>
            </div>

            <div class="stat">
                <strong id="wrong-count">0</strong>
                <span>Wrong</span>
            </div>

            <div class="stat">
                <strong id="total-count">0</strong>
                <span>Total</span>
            </div>

            <div class="stat">
                <strong id="time-taken">00:00</strong>
                <span>Time</span>
            </div>

        </div>

        <div class="result-actions">
            <button id="retry-btn">
                <i class="fa-solid fa-rotate-right"></i>
                Retry Quiz
            </button>
            <button id="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
                Back to Quiz
            </button>
        </div>

    </div>

</div>

<script src="result.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  var toggle = document.getElementById("sidebarToggle");
  var sidebar = document.getElementById("sidebar");
  var overlay = document.getElementById("sidebarOverlay");
  if (toggle && sidebar) {
    toggle.addEventListener("click", function () {
      sidebar.classList.toggle("open");
      if (overlay) overlay.classList.toggle("show");
    });
    if (overlay) {
      overlay.addEventListener("click", function () {
        sidebar.classList.remove("open");
        overlay.classList.remove("show");
      });
    }
  }
});
</script>
  <script src='../js/common.js'></script>
</body>
</html>
