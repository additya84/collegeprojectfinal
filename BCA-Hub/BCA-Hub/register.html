<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BCA Hub</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/register.css">
    <link rel="stylesheet" href="./css/responsive.css">
</head>
<body>

<div class="register-container">

    <div class="register-box">

        <div class="logo">
            <h2>🎓 BCA Hub</h2>
            <p>Learn • Practice • Grow</p>
        </div>

        <h1>Create Account</h1>

        <p class="subtitle">
            Join BCA Hub and start learning today
        </p>

        <form id="registerForm">

            <div class="input-group">
                <label>Full Name</label>
                <input id="registerName" type="text" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label>Roll Number</label>
                <input id="registerRoll" type="text" placeholder="Enter roll number" required>
            </div>

            <div class="input-group">
                <label>Semester</label>
                <select id="registerSemester" required>
                    <option value="">Select Semester</option>
                    <option>Semester 1</option>
                    <option>Semester 2</option>
                    <option>Semester 3</option>
                    <option>Semester 4</option>
                    <option>Semester 5</option>
                    <option>Semester 6</option>
                </select>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input id="registerEmail" type="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input id="registerPassword" type="password" placeholder="Create password" minlength="4" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input id="confirmPassword" type="password" placeholder="Confirm password" minlength="4" required>
            </div>

            <p id="registerMessage" aria-live="polite"></p>

            <button class="register-btn" type="submit">
                Create Account
            </button>

        </form>

        <p class="login-link">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</div>

<script src="./js/register.js"></script>
</body>
</html>
