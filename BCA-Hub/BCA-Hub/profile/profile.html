<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | BCA Hub</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>

<div class="profile-container">

    <div class="profile-card">

        <img src="../assets/profile.png" class="profile-img">

        <h2>Additya Choudhary</h2>

        <p class="course">BCA Student</p>

        <div class="info-box">
            <div class="info-item">
                <span>Email</span>
                <p>additya@example.com</p>
            </div>

            <div class="info-item">
                <span>College</span>
                <p>Dronacharya PG College</p>
            </div>

            <div class="info-item">
                <span>Completed Courses</span>
                <p>8</p>
            </div>

            <div class="info-item">
                <span>Quiz Score</span>
                <p>1250 Points</p>
            </div>
        </div>

        <div class="btn-group">
            <button class="edit-btn">Edit Profile</button>
            <button class="logout-btn">Logout</button>
        </div>

    </div>

</div>

<script src="profile.js"></script>
</body>
</html>
